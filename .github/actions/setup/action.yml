name: Setup Node + pnpm
description: Install pnpm, setup Node 22, and install dependencies (checkout must happen before this)

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: latest

    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install
