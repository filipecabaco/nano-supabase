name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run build
      - run: pnpm pack --dry-run

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        concern:
          - name: auth
            files: tests/auth-integration.test.ts
          - name: data
            files: tests/integration.test.ts tests/supabase-client.test.ts
          - name: storage
            files: tests/storage.test.ts
          - name: fetch-adapter
            files: tests/fetch-adapter.test.ts
          - name: fetch-adapter-data
            files: tests/fetch-adapter-data.test.ts
          - name: applications
            files: tests/applications.test.ts tests/full-user-flow.test.ts
          - name: mcp
            files: tests/mcp-server.test.ts
          - name: performance
            files: tests/performance.test.ts
          - name: extensions
            files: tests/extensions.test.ts
          - name: tcp
            files: tests/tcp-server.test.ts
          - name: tls
            files: tests/tls.test.ts
          - name: service
            files: tests/service.test.ts
          - name: memory
            files: tests/memory-options.test.ts

    name: test / ${{ matrix.concern.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run tests
        timeout-minutes: 5
        env:
          TEST_FILES: ${{ matrix.concern.files }}
        run: timeout --kill-after=10 180 pnpm vitest run $TEST_FILES; EXIT=$?; [ $EXIT -eq 0 ] || [ $EXIT -eq 124 ] || exit $EXIT

  test-cli:
    runs-on: ubuntu-latest
    name: test / cli
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run build
      - run: pnpm vitest run --config vitest.cli.config.ts
