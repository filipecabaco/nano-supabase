name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Verify package contents
        run: pnpm pack --dry-run

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        concern:
          - name: auth
            files: tests/auth-integration.test.ts
          - name: data
            files: tests/integration.test.ts tests/supabase-client.test.ts
          - name: storage
            files: tests/storage.test.ts
          - name: fetch-adapter
            files: tests/fetch-adapter.test.ts
          - name: applications
            files: tests/applications.test.ts tests/full-user-flow.test.ts
          - name: mcp
            files: tests/mcp-server.test.ts
          - name: performance
            files: tests/performance.test.ts
          - name: extensions
            files: tests/extensions.test.ts

    name: test / ${{ matrix.concern.name }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        env:
          TEST_FILES: ${{ matrix.concern.files }}
        run: pnpm vitest run $TEST_FILES

  test-cli:
    runs-on: ubuntu-latest
    name: test / cli
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run CLI tests
        run: pnpm vitest run --config vitest.cli.config.ts
