app = "nano-supabase-service"
primary_region = "lhr"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[mounts]
  source = "nano_supabase_data"
  destination = "/data"
  initial_size = "5gb"

[[vm]]
  size = "shared-cpu-4x"
  memory = "2048mb"
  cpus = 4

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"
